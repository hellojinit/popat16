<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Happy 16th — The World on July 13, 2010</title>
  <meta name="description" content="A time machine to the day you arrived. Your Barça, your Morocco, and the whole world — 2010 vs. 2026.">
  <meta name="theme-color" content="#070A12">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph / social share -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Happy 16th — The World on July 13, 2010">
  <meta property="og:description" content="A time machine to the day you arrived. Your Barça, your Morocco, and the whole world — 2010 vs. 2026.">
  <meta property="og:image" content="https://popat16.pages.dev/og.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Happy 16th — The World on July 13, 2010">
  <meta name="twitter:description" content="A time machine to the day you arrived. 2010 vs. 2026.">
  <meta name="twitter:image" content="https://popat16.pages.dev/og.jpg">

  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="preload" href="./fonts/space-grotesk-v22-latin-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./fonts/space-grotesk-v22-latin-500.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="progress" aria-hidden="true"></div>

  <main id="main">
    <!-- HERO — static so the largest paint needs no JS -->
    <section id="hero" class="hero section" aria-labelledby="hero-title">
      <div class="hero-glow" aria-hidden="true"></div>
      <div class="hero-particles" aria-hidden="true"></div>
      <div class="hero-inner">
        <p class="kicker hero-kicker">July 13, 2026 &middot; you're 16</p>
        <div class="odo" aria-hidden="true" data-odo>
          <div class="odo-strip"><span class="odo-year"><b>2</b><b>0</b><b>1</b><b>0</b></span></div>
        </div>
        <span class="sr-only">The year rewinds to 2010.</span>
        <h1 class="hero-title" id="hero-title">Happy 16th, <span id="hero-name">Popat</span>.</h1>
        <p class="hero-sub">This is the world on the day you arrived —<br>Tuesday, July&nbsp;13,&nbsp;2010.</p>
        <button class="play-btn" id="play-story" type="button">▶&nbsp;&nbsp;Play the story</button>
        <div class="scroll-cue" aria-hidden="true"><span class="scroll-cue-dot"></span></div>
      </div>
    </section>

    <!-- JS renders each section's contents from js/data.js -->
    <section id="day"        class="section" data-accent="amber"   aria-labelledby="day-title"></section>
    <section id="worldcup"   class="section" data-accent="gold"    aria-labelledby="worldcup-title"></section>
    <section id="barca"      class="section" data-accent="barca"   aria-labelledby="barca-title"></section>
    <section id="saints"     class="section" data-accent="saints"  aria-labelledby="saints-title"></section>
    <section id="numbers"    class="section" data-accent="neutral" aria-labelledby="numbers-title"></section>
    <section id="culture"    class="section" data-accent="pop"     aria-labelledby="culture-title"></section>
    <section id="climb"      class="section" data-accent="morocco" aria-labelledby="climb-title"></section>
    <section id="fullcircle" class="section" data-accent="peak"    aria-labelledby="fullcircle-title"></section>
    <section id="sweet"      class="section" data-accent="party"   aria-labelledby="sweet-title"></section>
    <section id="photos"     class="section" data-accent="gold"    aria-labelledby="photos-title"></section>
    <section id="finale"     class="section" data-accent="gold"    aria-labelledby="finale-title"></section>
  </main>

  <noscript>
    <div class="noscript">Happy 16th birthday! Turn on JavaScript to take the full trip back to July 10, 2010. 🎂⚽</div>
  </noscript>

  <script src="./js/data.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
